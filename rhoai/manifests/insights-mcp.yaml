apiVersion: v1
kind: ServiceAccount
metadata:
  name: insights-mcp
  namespace: mcp-gateway-demo
---
apiVersion: mcp.x-k8s.io/v1alpha1
kind: MCPServer
metadata:
  name: insights-mcp
  namespace: mcp-gateway-demo
spec:
  source:
    type: ContainerImage
    containerImage:
      ref: quay.io/redhat-services-prod/insights-management-tenant/insights-mcp/red-hat-lightspeed-mcp:latest
  config:
    port: 8080
    arguments:
      - --all-tools
      - --toolset
      - inventory,vulnerability,remediations
      - --debug
      - http
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
  runtime:
    security:
      serviceAccountName: insights-mcp
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
