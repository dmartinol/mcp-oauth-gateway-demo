static_resources:
  listeners:
  - name: mcp_listener
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8888
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: mcp_ingress
          codec_type: AUTO
          route_config:
            name: mcp_route
            virtual_hosts:
            # default route: client-facing, sends to the broker
            - name: mcp_gateway
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: mcp_broker
            # per-server route: router sets :authority to this hostname for tools/call
            - name: insights_mcp_server
              domains: ["insights-mcp.mcp.local"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: insights_mcp_upstream
          http_filters:
          - name: envoy.filters.http.ext_proc
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
              failure_mode_allow: false
              allow_mode_override: true
              mutation_rules:
                allow_all_routing: true
              message_timeout: 10s
              grpc_service:
                envoy_grpc:
                  cluster_name: mcp_router
              processing_mode:
                request_header_mode: SEND
                response_header_mode: SEND
                request_body_mode: BUFFERED
                response_body_mode: NONE
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # broker: the MCP aggregator running on the host (port 8081 to avoid conflict with insights-mcp)
  # host.containers.internal is injected automatically by Podman into /etc/hosts
  - name: mcp_broker
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: mcp_broker
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.containers.internal
                port_value: 8081

  # router: the ext_proc gRPC server running on the host
  - name: mcp_router
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: mcp_router
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.containers.internal
                port_value: 50051

  # insights-mcp upstream: the MCP server on the host (direct tool/call routing)
  - name: insights_mcp_upstream
    connect_timeout: 5s
    type: STRICT_DNS
    lb_policy: ROUND_ROBIN
    load_assignment:
      cluster_name: insights_mcp_upstream
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: host.containers.internal
                port_value: 8080
