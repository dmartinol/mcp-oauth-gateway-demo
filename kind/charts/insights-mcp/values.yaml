image:
  repository: quay.io/redhat-services-prod/insights-management-tenant/insights-mcp/red-hat-lightspeed-mcp
  tag: latest
  pullPolicy: Always

# imagePullSecrets: []
# Uncomment and populate if quay.io requires authentication:
#   kubectl create secret docker-registry quay-pull-secret \
#     --docker-server=quay.io \
#     --docker-username=<user> \
#     --docker-password=<token> \
#     -n mcp-system
imagePullSecrets: []

# Override the container entrypoint. Leave empty to use the image default.
command: []

# Arguments passed to the container entrypoint.
# 'http' selects HTTP transport; --host/--port configure the listener.
args:
  - --all-tools
  - --toolset
  - inventory,vulnerability,remediations
  - --debug
  - http
  - --host
  - "0.0.0.0"
  - --port
  - "8080"

# Environment variables passed to the container.
# This demo relies on the client's Bearer token (forwarded by the gateway), not embedded API creds.
env: []

# envFrom is unused in the default demo flow.
envFrom: []

service:
  # Port the container listens on (must match --port arg above).
  port: 8080

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
