apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth-metadata-route
  namespace: mcp-system
spec:
  parentRefs:
  - name: mcp-gateway
    namespace: gateway-system
    sectionName: mcp
  hostnames:
  - __MCP_PUBLIC_HOST__
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /.well-known/
    backendRefs:
    - name: mcp-gateway
      port: 8080
