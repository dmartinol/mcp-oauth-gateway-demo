apiVersion: kuadrant.io/v1
kind: AuthPolicy
metadata:
  name: mcp-auth
  namespace: gateway-system
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: mcp-gateway
    sectionName: mcp
  defaults:
    when:
      - predicate: "!request.path.contains('/.well-known')"
    rules:
      authentication:
        redhat-sso:
          jwt:
            issuerUrl: https://sso.redhat.com/auth/realms/redhat-external
      response:
        unauthenticated:
          code: 401
          headers:
            WWW-Authenticate:
              value: Bearer resource_metadata=http://__MCP_PUBLIC_HOST__:__MCP_PUBLIC_PORT__/.well-known/oauth-protected-resource
          body:
            value: |
              {"error":"Unauthorized","message":"Authentication required."}
