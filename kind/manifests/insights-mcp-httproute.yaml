apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: insights-mcp-route
  namespace: mcp-system
spec:
  parentRefs:
  - name: mcp-gateway
    namespace: gateway-system
    sectionName: mcps
  hostnames:
  - insights-mcp.mcp.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: insights-mcp
      port: 8080
